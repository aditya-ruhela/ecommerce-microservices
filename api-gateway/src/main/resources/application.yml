server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/orders/**

            - id: inventory-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/inventory/**

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/payments/**